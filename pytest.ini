[pytest]
# Put src/ (and scripts/) on the import path so tests can do the same bare
# imports the app uses at runtime (launcher.py inserts src/ into sys.path).
pythonpath = src scripts

testpaths = tests

# Coverage over the app source under test (see .coveragerc for omit rules and
# excluded entry-point lines). The 95% floor is enforced in CI (see the
# tests workflow) rather than here, so running a single test file locally does
# not fail merely because other modules were not exercised.
addopts = -q --cov=src --cov=bump_changelog --cov-report=term-missing

markers =
    macos: tests that require rumps/AppKit and only run on macOS
