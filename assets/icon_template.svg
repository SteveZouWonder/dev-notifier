<?xml version="1.0" encoding="UTF-8"?>
<!--
  Dev Notifier icon template.
  A glowing lightning bolt inside a pulse ring. Colors are placeholders
  substituted per theme by scripts/generate_icon.py:
    {C1} = primary/lighter gradient stop
    {C2} = secondary/darker gradient stop
    {GLOW} = outer glow color
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="{C1}"/>
      <stop offset="50%" stop-color="{C3}"/>
      <stop offset="100%" stop-color="{C2}"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="{C1}" stop-opacity="0.20"/>
      <stop offset="70%" stop-color="{C2}" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="{C2}" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- soft rounded background so the app icon reads well on any wallpaper -->
  <rect x="96" y="96" width="832" height="832" rx="188"
        fill="#0f172a"/>
  <rect x="96" y="96" width="832" height="832" rx="188"
        fill="url(#bgGrad)"/>

  <!-- pulse rings -->
  <circle cx="512" cy="512" r="300" fill="none"
          stroke="{GLOW}" stroke-width="10" stroke-opacity="0.28"/>
  <circle cx="512" cy="512" r="236" fill="none"
          stroke="{GLOW}" stroke-width="12" stroke-opacity="0.45"/>

  <!-- lightning bolt -->
  <g filter="url(#glow)">
    <path d="M565 232 L392 556 L500 556 L459 792 L648 452 L534 452 Z"
          fill="url(#boltGrad)"
          stroke="{C1}" stroke-width="8" stroke-linejoin="round"/>
  </g>
</svg>
